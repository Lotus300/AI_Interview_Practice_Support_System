name: Deploy VOICEVOX CPU to Cloud Run

on:
  workflow_dispatch:

concurrency:
  group: deploy-voicevox-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  VOICEVOX_SERVICE: voicevox-engine
  VOICEVOX_IMAGE: docker.io/voicevox/voicevox_engine@sha256:0bdb4c44df9fdb8887b74ccaee224c15d53939dcd5d6595ea111aec909065b0b
  VOICEVOX_RUNTIME_SERVICE_ACCOUNT: voicevox-runtime@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy private VOICEVOX CPU service
        run: |
          gcloud run deploy "${VOICEVOX_SERVICE}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --image="${VOICEVOX_IMAGE}" \
            --service-account="${VOICEVOX_RUNTIME_SERVICE_ACCOUNT}" \
            --execution-environment=gen2 \
            --port=50021 \
            --cpu=4 \
            --memory=8Gi \
            --concurrency=1 \
            --min-instances=0 \
            --max-instances=1 \
            --timeout=300 \
            --cpu-boost \
            --no-allow-unauthenticated \
            --set-env-vars="VV_HOST=0.0.0.0,VV_PORT=50021,VV_CPU_NUM_THREADS=4,VV_DISABLE_MUTABLE_API=1" \
            --labels="component=voicevox,accelerator=cpu" \
            --quiet

      - name: Allow only the backend runtime to invoke VOICEVOX
        run: |
          gcloud run services add-iam-policy-binding "${VOICEVOX_SERVICE}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --member="serviceAccount:${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}" \
            --role="roles/run.invoker" \
            --quiet

      - name: Show deployment summary
        run: |
          SERVICE_URL="$(gcloud run services describe "${VOICEVOX_SERVICE}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --format='value(status.url)')"
          echo "VOICEVOX service: ${VOICEVOX_SERVICE}"
          echo "VOICEVOX URL: ${SERVICE_URL}"
          echo "Image: ${VOICEVOX_IMAGE}"
          echo "Access: authenticated backend runtime only"
